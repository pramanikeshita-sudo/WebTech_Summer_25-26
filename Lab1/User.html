<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title> SignUp </title>
    </head>
    <body>
        <div class = "container">
         <h1> User Registartion Form </h1>
        <fieldset>
            <legend> User Personal Information </legend>
    
            <form>
            <table>
                <tr> 
                    <td><label for ="name">First Name : </label></td>
                    <td><input type ="text" id ="name" name="name" placeholder="Enter Your First Name"></td>
                </tr>

                <tr> 
                    <td><label for ="name">Last Name : </label></td>
                    <td><input type ="text" id ="name" name="name" placeholder="Enter Your Last Name"></td>
                </tr>

                <tr>
                    <td><label for ="DOB"> DOB : </label> </td>
                    <td><input type ="date" id ="DOB" name="DOB"></td>
                </tr>

                <tr>
                    <td><label for ="Phone"> Phone Number : </label></td>
                    <td><input type ="text" id ="Phone" name="Phone" placeholder="Enter Your Phone Number"></td>
                </tr>


                <tr> 
                    <td><label for ="Profession"> User Profession   : </label>  </td>
                    <td>
                        <input type="checkbox" id="Student" name="Profession">
                        <label for ="Student"> Student </label>
                        <br>
                        <input type="checkbox" id="Faculty" name="Profession">
                        <label for ="Faculty"> Faculty </label>
                        <br>
                        <input type="checkbox" id="PrivateJob" name="Profession">
                        <label for ="PrivateJob"> Private Job Holder </label>
                    </td>
                </tr>

                 </table> 
        </fieldset>
           
       <fieldset>
        <legend>Contact Information</legend>
        <table>
            <tr>
                <td><label for ="Email"> Email Account: </label></td>
                <td><input type="email" id="Email" name="Email"></td>
            </tr>
            
            <tr>
                <td><label for ="phone"> Phone Number: </label></td>
                <td><input type="number" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td><label for ="Address"> Address:</label></td>
                <td><textarea id="Address" rows="4" cols="25" style="resize:none"></textarea></td>
            </tr>
            <tr>
                <td><label for ="Country"> Country: </label></td>
                <td>
                    <select id="Country" name="Country">
                        <option value="default">--Select Country--</option>
                        <option value="Bd">Bangladesh</option>
                        <option value="USA">USA</option>
                        <option value="UK">UK</option>
                        <option value="Argentina">Argentina</option>
                    </select>
                </td>
            </tr>
        </table>
       </fieldset>


        <fieldset>
            <legend> Account Information </legend>
            <table>
                <tr> 
                     <td><label for ="username"> User Name: </label> </td>
                     <td><input type="text" id="username" name="username"></td>
                </tr>
                <tr>
                    <td><label for ="Password"> Password: </label> </td>
                     <td><input type="password" id="Password" name="Password"></td>
                </tr>

                <tr>
                    <td><label for ="CPassword"> Confirm Password: </label> </td>
                     <td><input type="password" id="CPassword" name="CPassword"></td>
                </tr>
            </table>
        </fieldset>
             <tr>
                    <td><input type="checkbox" id="Condition" name="condtion">
                    <label for ="Condition"> <font color="red">I have Agreed Terms and Conditions*</font> </label> </td>
                </tr><br>
        <input type = "submit" id ="submit" name ="submit" value =SignUp>
        <input type = "reset" id ="reset" name ="reset">


        </form>
          </div>
    </body>
</html>
